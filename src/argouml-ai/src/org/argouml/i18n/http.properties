# HTTP server settings bundle.
#
# All values are ASCII-only; non-ASCII is encoded as Java \uXXXX escapes
# so this file is ISO-8859-1 clean per AGENTS.md. Translator.localize()
# resolves keys whose first dotted segment is "http" through this bundle
# (Translator looks up "org.argouml.i18n.http" regardless of the calling
# class's package).
http.settings.tab=HTTP Server
http.settings.enable=Enable HTTP server
http.settings.port=Port:
http.settings.bind=Bind address:
http.settings.apply=Apply
http.settings.applied=Settings saved. Restart ArgoUML to apply changes.
http.settings.invalid.port=Port must be between 1 and 65535.
http.settings.invalid.bind=Bind address must not be empty.