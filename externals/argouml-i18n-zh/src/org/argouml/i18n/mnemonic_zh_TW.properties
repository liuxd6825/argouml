# ArgoUML i18n patch: zh_CN for keys missing from upstream bundle.
# Patch module: externals/argouml-i18n-zh-patch
# Upstream module: externals/argouml-i18n-zh (unchanged, do not edit here).
# Keys here override upstream on the same bundle when present.

# Menu mnemonic accelerators for wizard-style dialogs. Kept as English
# letters (B=back, F=finish, H=help, N=next) following the standard
# Chinese-localized UI convention where the original Latin letter is the
# visible accelerator regardless of menu language.
mnemonic.button.back = B
mnemonic.button.finish = F
mnemonic.button.help = H
mnemonic.button.next = N
