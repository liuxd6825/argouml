# ArgoUML i18n patch: zh_CN for keys missing from upstream bundle.

wfr.UML142.ActionState.3-head = 源自动作状态的转换不应有触发事件。
wfr.UML142.ActionState.3-desc = 动作状态的良构性规则 3。\n\
    一旦动作状态的入边动作开始执行，\
    入边动作完成后，动作被认为已完成。\
    动作完成后，出边转换即可使能。 \n\n\
    因此出边转换不应携带触发事件。\n\n\
    要解决此问题，请删除该触发事件。

wfr.UML142.Actor.1a-head = 参与者只能拥有二元关联。
wfr.UML142.Actor.1a-desc = 参与者的良构性规则 1a。\n\
    参与者只能拥有二元关联。\n\n\
    要解决此问题，请从关联中删除多余的关联端。

wfr.UML142.Actor.1b-head = 参与者只能与用例、子系统及类建立关联。
wfr.UML142.Actor.1b-desc = 参与者的良构性规则 1b。\n\
    参与者只能与用例、子系统及类建立关联。

wfr.UML142.Actor.2-head = 参与者不能包含任何类元。
wfr.UML142.Actor.2-desc = 参与者的良构性规则 2。\n\
    参与者不能包含任何类元。

wfr.UML142.AssociationClass.1-head = 关联端与结构特性的名称不能重叠。
wfr.UML142.AssociationClass.1-desc = 关联类的良构性规则 1。\n\
    关联端与结构特性的名称不能重叠。

wfr.UML142.AssociationClass.2-head = 不能在关联类与其他元素之间定义关联类。
wfr.UML142.AssociationClass.2-desc = 关联类的良构性规则 2。\n\
    不能在关联类与其他元素之间定义关联类。

wfr.UML142.Classifier.5-head = 对端关联端的名称不能与属性或类元所含模型元素的名称相同。
wfr.UML142.Classifier.5-desc = 类元的良构性规则 5。\n\
    对端关联端的名称不能与属性或类元所含模型元素的名称相同。

wfr.UML142.DataType.1-head = 数据类型只能包含操作，且所有操作必须为查询。
wfr.UML142.DataType.1-desc = 数据类型的良构性规则 1。\n\
    数据类型只能包含操作，且所有操作必须为查询。

wfr.UML142.GeneralizableElement.1-head = 根不能拥有任何泛化关系。
wfr.UML142.GeneralizableElement.1-desc = 可泛化元素的良构性规则 1。\n\
    根不能拥有任何泛化关系。

wfr.UML142.GeneralizableElement.4-head = 父元素必须包含在可泛化元素的命名空间中。
wfr.UML142.GeneralizableElement.4-desc = 可泛化元素的良构性规则 4。\n\
    父元素必须包含在可泛化元素的命名空间中。

wfr.UML142.Namespace.2-head = 所有关联在命名空间中必须拥有唯一的名称与关联类元组合。
wfr.UML142.Namespace.2-desc = 命名空间的良构性规则 2。\n\
    所有关联在命名空间中必须拥有唯一的名称与关联类元组合。

wfr.UML142.UseCase.1-head = 用例只能拥有二元关联。
wfr.UML142.UseCase.1-desc = 用例的良构性规则 1。\n\
    用例只能拥有二元关联。

wfr.UML142.UseCase.2-head = 用例不能与指定相同实体的用例之间存在关联。
wfr.UML142.UseCase.2-desc = 用例的良构性规则 2。\n\
    用例不能与指定相同实体的用例之间存在关联。

wfr.UML142.UseCase.3-head = 用例不能包含任何类元。
wfr.UML142.UseCase.3-desc = 用例的良构性规则 3。\n\
    用例不能包含任何类元。

wfr.UML142.UseCase.4-head = 用例中的扩展点名称必须唯一。
wfr.UML142.UseCase.4-desc = 用例的良构性规则 4。\n\
    用例中的扩展点名称必须唯一。
