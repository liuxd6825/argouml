aboutbox.aboutbox-title = 关于ArgoUML

aboutbox.bugreport =\ 如何回报bug?.\
                                 \n\
                                 和很多软件应用一样, ArgoUML肯定也有一些bug:  \
                                 可能是非正常的功能, 怪异的行为等.  有一些已经发现\
                                 了, 有些还没. 为了确使你的问题被ArgoUML项目组知悉, \
                                 请按以下步骤操作:\
	\n\
	1.  访问项目网站 http://argouml.tigris.org.\n\
	\n\
	2.  如果你还未注册的话, 请先注册为Tigris的会员.\n\
	\n\
	3.  如果你还不是本项目的观察员(Observer), 请申请这个角色.\n\
	\n\
	4.  到问题反馈页面 (Bugs和待完成事项).\n\
	\n\
	5.  在数据库中查找你发现的bug.\n\
	\n\
	6.  如果查询的结果中已经有这个bug, 那么把你发现的特殊状况添加\
                      进去, 同时将你的email设置为此bug的抄送对象, 这就完成了回报bug的\
                      过程. 而如果你在数据库中没有找到这个bug的话, 则建立一个新的待\
                     办事项.\
	\n\
	7.  当你创建一个新的待办事项, 或者已经存在的待办事项添加信息时\
                      请确保包含以下内容:\n\
	-+- 你正在使用的程序的版本号,\n\
	-+- 你使用的 JDK 或 JRE 的版本号,\n\
	-+- 导致这个问题的所有"相关"步骤,\n\
	-+- 你执行过的测试用例(如果有的话),\n\
	-+- 你的测试用例的预期结果,\n\
	-+- 你的测试用例的实际结果, 以及\n\
	-+- 你认为问题出在哪里.\n\
	\n\
	8.  如果问题可以重现, 请打开日志功能重新运行程序\
	(java -Dlog4j.configuration=org/argouml/resource/full.lcf \
	-jar argouml.jar) \
	并把日志文件argo_full.log提交到待办事项.\n\
	\n\
	9.  以附件形式提交其他其他相关的资料. \
	屏幕截屏, 你的项目文件, 日志文件等.\n\
	别忘了 ArgoUML 是非常开放的工程, 如果有涉及商业机密或其他敏感信息\
                      请在上载前过滤掉.\n\
	\n\
	10. 如果有人处理或者评论这个待办事项, 你将收到邮件.\n\
	\n\
	11. 当你创建的或者加附注的待办事项被处理了而且得到你的认可, 那么你就\
                      可以关闭(close)这个待办事项表示你接受了.\n\
	\n\
	经过以上步骤, 你为 ArgoUML 做出了重要贡献. 你的帮助使 ArgoUML 可能成为\
                      一个更好的软件. 当然如果你希望做得更多, 非常欢迎! 如调查和解决那些问题, 请从 Cookbook \
	第一章开始.

