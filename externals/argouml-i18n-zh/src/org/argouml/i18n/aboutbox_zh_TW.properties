aboutbox.aboutbox-title=關於ArgoUML
aboutbox.bugreport=\
                                 如何回報臭蟲?\
                                 \n跟許多應用軟體一樣，ArgoUML裡會有一些臭蟲bugs，\
                                 可能是不正常的功能，或怪異的行為，有些已經發現，有\
                                 些還沒。為了讓你發現的問題，被ArgoUML計劃知道，請進\
                                 行以下步驟。\
                                 \n1. 造訪網站http\://argouml.tigris.org.　\
                                 \n2. 如果您還沒有註冊的話，請註冊為Tigris的成員。　\
                                 \n3. 如果還沒有的話，要求成為本計劃的觀察員Observer。　\
                                 \n4. 到Issuezilla (臭蟲Bugs 和待完事項Issues)　\
                                 \n5. 在資料庫尋找你發現的臭蟲。 \
                                 \n6. 如果搜尋的結果，這個臭蟲已經被發現了，將你發現的特\
                                 殊狀況記進去，同時將您設為電子郵件的cc對象，這就完成了\
                                 回報的過程。另一方面，如果你在資料庫沒有找到這個臭蟲，\
                                 建立一個新的待辦事項。　\
                                 \n7.當建立一個新待辦事項或增加新資訊到現有的待辦事項時，請注意\
                                 提供以下訊息，\n\
                                 -+- 您執行的應用程式版本, \n\
                                 -+- 您使用的JDK或JRE版本, \n\
                                 -+- 每一個執行步驟, \n\
                                 -+- 您執行的測試案例 (如果有的話), \n\
                                 -+- 您測試案例的預期結果, \n\
                                 -+- 實際的狀況, 以及 \n\
                                 -+- 您認為問題出現在那裡.  \
                                 \n8.  如果問題是可以重覆確認，打開loggin的功能 \
                                 (java -Dlog4j.configuration\=org/argouml/resource/full.lcf -jar argouml.jar)，\
                                 執行程式，將logging記錄檔 argo_full.log 加到待辦事項裡  \
                                 \n9.  將其它相類的資訊附進去，包括螢幕快照，您的專案檔，log檔，別\
                                 忘了ArgoUML是個非常開放的專案，所以如果有商業機密或敏銳資訊，請\
                                 在附加前，事先過濾。 \
                                 \n10. 如果有人對此有評論或做了相關的變動，你會由Email取得更新。 \
                                 \n11.當你建立或加註的待辦事項被修正或認可了，如果你接受解決方案，\
                                 就可以關閉待辦事項了。 \
                                 \n藉著遵循上述的步驟，你對ArgoUML專案就做\
                                 了重要貢獻。您讓ArgoUML可能變成更好的產品，當然如果您想做得更多，\
                                 如調查與修正問題，非常地歡迎。您可以由閱讀Cookbook第一章開始。.
