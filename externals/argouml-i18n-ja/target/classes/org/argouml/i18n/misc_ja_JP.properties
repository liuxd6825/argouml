# Minimal smoke-test bundle for ja-JP locale.
#
# Three keys to verify the multi-language plumbing works end-to-end:
# - ISO-8859-1 encoded .properties files with \uXXXX escapes for
#   non-ASCII characters
# - Maven jar shape (resources at org/argouml/i18n/* in the JAR)
# - ResourceBundle.getBundle() locale fallback chain
# - Locale selection via -Duser.language=ja -Duser.country=JP
#
# All other UI strings fall back to English for now.

misc.unnamed   = (\u672A\u547D\u540D {0})
button.ok      = OK
button.refresh = \u30EA\u30ED\u30FC\u30C9
